# DeutschBuch Final Project - Spring Boot Backend
server.port=8080

# PostgreSQL Config
spring.datasource.url=jdbc:postgresql://localhost:5432/deutschbookdb
spring.datasource.username=hydpro15
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Uploads
app.upload.dir=uploads

# CORS
app.cors.allowed-origins=http://localhost:3000

# Admin role fallback allow-list. Replace with your Firebase email.
app.admin.emails=lehrerdemir@gmail.com

# Firebase Admin SDK service account file path. Put your local JSON path here.
firebase.service-account-file=

# Stripe test secret key. Put sk_test_... here or set STRIPE_SECRET_KEY env variable.
stripe.secret-key=

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Local demo mode: true allows running protected pages without creating Firebase/Stripe accounts.
# For real Firebase/Stripe demo, set both values to false and fill keys above.
app.demo-auth.enabled=true
app.demo-payment.enabled=true
